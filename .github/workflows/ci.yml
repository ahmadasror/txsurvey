name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One in-flight run per ref; new pushes cancel stale runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Go — lint & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: txsurvey
          POSTGRES_PASSWORD: txsurvey
          POSTGRES_DB: txsurvey_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U txsurvey -d txsurvey_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Name contains "test" so the integration-suite safety guard runs (not skips).
      DATABASE_URL: postgres://txsurvey:txsurvey@localhost:5432/txsurvey_test?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Vet + gofmt
        run: make lint

      - name: Test (with Postgres)
        run: go test ./... -race

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck + build
        run: npm run build
