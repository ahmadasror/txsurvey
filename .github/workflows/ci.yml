name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One in-flight run per ref; new pushes cancel stale runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Go — lint & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: txsurvey
          POSTGRES_PASSWORD: txsurvey
          POSTGRES_DB: txsurvey_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U txsurvey -d txsurvey_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Name contains "test" so the integration-suite safety guard runs (not skips).
      DATABASE_URL: postgres://txsurvey:txsurvey@localhost:5432/txsurvey_test?sslmode=disable

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Vet + gofmt
        run: make lint

      - name: Test (with Postgres)
        run: go test ./... -race

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck + build
        run: npm run build

  e2e:
    name: E2E — Playwright (create-survey)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: txsurvey
          POSTGRES_PASSWORD: txsurvey
          POSTGRES_DB: txsurvey_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U txsurvey -d txsurvey_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://txsurvey:txsurvey@localhost:5432/txsurvey_test?sslmode=disable

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      # Single-origin build: SPA at root base, embedded into the Go binary, so
      # the E2E exercises the real server (API + SPA + security headers) as one.
      - name: Build SPA (root base) + embed into server
        run: |
          (cd frontend && npx vite build --base=/)
          rm -rf internal/web/dist && cp -r frontend/dist internal/web/dist
          go build -tags embedspa -o bin/e2e-server ./cmd/server

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run server + E2E (headless chromium)
        working-directory: frontend
        env:
          E2E_BASE_URL: http://127.0.0.1:8081
        run: |
          # dev-login route requires APP_ENV != production.
          (cd .. && APP_ENV=development \
            DATABASE_URL="$DATABASE_URL" \
            JWT_SECRET="ci-e2e-secret-at-least-32-characters-long" \
            SERVER_PORT=8081 COOKIE_PATH=/ COOKIE_SECURE=false \
            ./bin/e2e-server &)
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:8081/health >/dev/null && break; sleep 1; done
          npx playwright test

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
