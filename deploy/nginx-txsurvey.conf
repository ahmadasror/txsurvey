# Canonical production edge for txsurvey.
#
# The app listens on the host bridge at 172.17.0.1:8092. nginx strips the
# /txsurvey/ prefix before proxying; APP_BASE_URL and the Vite build retain the
# public prefix. Merge these locations into the existing static-web nginx config
# if that config also owns other applications on either host.

# --- Canonical host ---------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name brainzap.net;

    ssl_certificate     /etc/letsencrypt/live/brainzap.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brainzap.net/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # robots.txt must live at the origin root. The app-scoped sitemap remains
    # under /txsurvey/ and contains only indexable txsurvey pages.
    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nAllow: /\n\nSitemap: https://brainzap.net/txsurvey/sitemap.xml\n";
    }

    location = /txsurvey {
        return 301 /txsurvey/;
    }

    location /txsurvey/ {
        proxy_pass http://172.17.0.1:8092/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        client_max_body_size 5m;
    }

    # Keep the existing locations for other brainzap.net applications here.
}

# --- Legacy alias: txsurvey paths only --------------------------------------
# Keep unrelated ct.tuxceria.biz.id applications on their existing locations.
server {
    listen 443 ssl;
    http2 on;
    server_name ct.tuxceria.biz.id;

    ssl_certificate     /etc/letsencrypt/live/ct.tuxceria.biz.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ct.tuxceria.biz.id/privkey.pem;

    location = /txsurvey {
        return 301 https://brainzap.net/txsurvey/;
    }

    location ^~ /txsurvey/ {
        return 301 https://brainzap.net$request_uri;
    }

    # Keep the existing locations for other ct.tuxceria.biz.id applications here.
}

server {
    listen 80;
    server_name brainzap.net ct.tuxceria.biz.id;
    return 301 https://$host$request_uri;
}
