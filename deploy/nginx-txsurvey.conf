# nginx config for serving txsurvey under the /txsurvey subpath of an existing
# host (ct.tuxceria.biz.id). Strategy: strip the /txsurvey/ prefix and proxy to
# the Go app, which runs at the root (no Go routing changes). The SPA build sets
# VITE_BASE=/txsurvey/ so the browser always uses /txsurvey/* URLs; nginx removes
# the prefix for the upstream.
#
# The trailing slash on `proxy_pass http://127.0.0.1:8080/;` is what strips the
# location prefix:  /txsurvey/api/v1/x  ->  /api/v1/x.

server {
    listen 443 ssl;
    http2 on;
    server_name ct.tuxceria.biz.id;

    # --- TLS (Let's Encrypt / certbot) ---
    ssl_certificate     /etc/letsencrypt/live/ct.tuxceria.biz.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ct.tuxceria.biz.id/privkey.pem;

    # ... your other apps on this host (location / { ... }) stay as they are ...

    # --- txsurvey ---
    # Redirect the bare prefix to the trailing-slash form so relative assets resolve.
    location = /txsurvey {
        return 301 /txsurvey/;
    }

    location /txsurvey/ {
        proxy_pass http://127.0.0.1:8080/;     # trailing slash strips /txsurvey/
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CSV export can be a larger body; keep buffering sane.
        proxy_read_timeout 60s;
        client_max_body_size 5m;
    }
}

# Redirect http -> https (if not already handled globally).
server {
    listen 80;
    server_name ct.tuxceria.biz.id;
    return 301 https://$host$request_uri;
}
