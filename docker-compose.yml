services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: txsurvey
      POSTGRES_PASSWORD: txsurvey
      POSTGRES_DB: txsurvey
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U txsurvey"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://txsurvey:txsurvey@postgres:5432/txsurvey?sslmode=disable
      SERVER_PORT: "8080"
      APP_ENV: production
      APP_BASE_URL: http://localhost:8080
      JWT_SECRET: change-me-to-at-least-32-characters-long-secret
      SESSION_TTL: 24h
      COOKIE_SECURE: "false"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URL: http://localhost:8080/api/v1/auth/google/callback
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"

volumes:
  pgdata:
